# ChannelSync Shopify App Configuration
# Use with: shopify app dev --config shopify.app.channelsync.toml

name = "ChannelSync"
client_id = "YOUR_CLIENT_ID_HERE"
application_url = "https://channelsync.vercel.app"
embedded = true

[access_scopes]
scopes = "read_orders,read_products"

[auth]
redirect_urls = [
  "https://channelsync.vercel.app/api/auth/shopify/callback",
  "https://localhost:3000/api/auth/shopify/callback"
]

[webhooks]
api_version = "2024-10"

  [[webhooks.subscriptions]]
  topics = ["orders/create", "orders/updated"]
  uri = "/api/webhooks/shopify/orders"

  [[webhooks.subscriptions]]
  topics = ["refunds/create"]
  uri = "/api/webhooks/shopify/refunds"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/api/webhooks/shopify/uninstall"

[pos]
embedded = false

[build]
automatically_update_urls_on_dev = true
dev_store_url = "YOUR_DEV_STORE.myshopify.com"

[webhooks.privacy_compliance]
customer_data_request_url = "/api/webhooks/customers/data-request"
customer_deletion_url = "/api/webhooks/customers/redact"
shop_deletion_url = "/api/webhooks/shop/redact"
